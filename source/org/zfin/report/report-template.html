    <style>
        html, body {
            font: 14px/1.4 'Helvetica Neue', arial, sans-serif;
            color: #333;
            margin: 0;
            background-color: #c9e0e0;
        }
        h1, h2, h3, h4 { color: #234; }
        a { color: #035361; }

        #header {
            background: #fff;
            padding: 18px 20px 14px;
            border-bottom: 5px solid #c9e0e0;
        }
        #header h1 { margin: 0; font-size: 26px; text-align: center; }
        #header .subtitle { color: #666; text-align: center; margin-top: 4px; }

        #breadcrumb {
            background: #c9e0e0;
            padding: 8px 20px;
        }
        #breadcrumb ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        #breadcrumb li { display: flex; align-items: center; }
        #breadcrumb li::before {
            content: "\00BB";
            color: #888;
            padding: 0 8px;
        }
        #breadcrumb li:first-child::before { content: ""; padding: 0; }
        .breadcrumb-button {
            text-decoration: none;
            background: #f7fbfb;
            color: #345;
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #99bcbc;
            font-weight: 600;
            font-size: 13px;
        }
        .breadcrumb-button:hover { background: #fff; }
        .breadcrumb-current {
            font-weight: 600;
            padding: 4px 12px;
            color: #234;
        }

        #content {
            display: flex;
            background: #fff;
            min-height: 500px;
        }
        #left-nav {
            width: 290px;
            padding: 15px;
            border-right: 5px solid #c9e0e0;
            background: #fafdfd;
            overflow-x: hidden;
        }
        #left-nav h3 { margin: 0 0 10px; }
        #right-content {
            flex: 1;
            padding: 18px 30px 30px;
            /* Grow to fit a wide table rather than letting it overflow.
               min-content (vs. the default `auto`) is functionally the same
               here but explicit; the page scrolls horizontally if a table
               is wider than the viewport. */
            min-width: min-content;
        }
        #footer {
            background: #c9e0e0;
            padding: 8px 20px;
            color: #466;
            font-size: 12px;
            text-align: right;
        }

        .tree-row {
            padding: 3px 4px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            font-size: 13px;
        }
        .tree-row:hover { background: #eef4f4; }
        .tree-row.selected {
            background: #d4e9e9;
            font-weight: 600;
        }
        .tree-row a {
            text-decoration: none;
            color: #234;
            flex: 1;
            padding: 1px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tree-toggle {
            display: inline-block;
            width: 16px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            color: #888;
            font-size: 10px;
        }
        .cat-icon { margin-right: 4px; }
        .tree-row .count { color: #888; font-weight: normal; font-size: 11px; }

        .node-view h2 { margin: 0 0 8px; }
        .node-view .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 0 0 12px;
            min-height: 28px;
        }
        .node-view .nav-buttons button {
            background: #f0f0f0;
            border: 1px solid #ccc;
            width: 32px;
            height: 28px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            color: #345;
        }
        .node-view .nav-buttons button:hover { background: #e0e0e0; }
        .node-view .nav-buttons .spacer { flex: 1; }

        .category-description {
            background: #f0f6f6;
            padding: 8px 12px;
            border-left: 3px solid #4c8f98;
            margin: 0 0 14px;
            color: #345;
        }
        .body { margin: 12px 0; line-height: 1.5; }
        .body[data-format="text"] { white-space: pre-wrap; }
        .tags { margin: 4px 0 12px; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            font-size: 11px;
            border: 1px solid rgba(0,0,0,.15);
            margin-right: 4px;
            border-radius: 3px;
            background: #aeaeff;
        }

        .fields-table {
            border-collapse: collapse;
            margin: 10px 0;
        }
        .fields-table th, .fields-table td {
            text-align: left;
            padding: 5px 12px;
            border: 1px solid #ddd;
            vertical-align: top;
        }
        .fields-table th {
            background: #f0f6f6;
            font-weight: 600;
            min-width: 140px;
            color: #345;
        }

        .report-table { margin: 18px 0; }
        .report-table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 0 0 4px;
            min-height: 24px;
        }
        .report-table-header h4 { margin: 0; }
        .table-description { color: #666; font-size: 13px; margin: 0 0 6px; }
        .csv-download-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 3px;
            color: #678;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
        }
        .csv-download-btn:hover { background: #eef4f4; color: #035361; }
        .csv-download-btn svg { display: block; }
        .table-search-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0 8px;
        }
        .filter-info { color: #678; font-size: 12px; }

        .data-table {
            border-collapse: collapse;
            border: 1px solid #ccc;
            /* Size to content — small tables shouldn't stretch the full pane,
               making it harder to trace a row across mostly-empty space. */
        }
        .data-table th, .data-table td {
            text-align: left;
            padding: 5px 10px;
            border: 1px solid #ddd;
            vertical-align: top;
        }
        .data-table th { background: #c9e0e0; }
        .data-table tr:nth-child(even) { background: #f6fafa; }
        /* Inline diff highlights: producers emit <u>…</u> around character ranges
           that differ from a paired cell (see OrthoNameDiff). The underline is what
           Excel preserves on export; the yellow background is the in-browser cue. */
        .data-table u { background-color: #ffeb3b; text-decoration-thickness: 1.5px; }
        /* The children-list is the main navigation surface for a structural
           node; keep it full width so titles + columns line up across siblings. */
        .children-list .data-table { width: 100%; }

        .children-list {
            margin-top: 24px;
            padding-top: 14px;
            border-top: 2px solid #c9e0e0;
        }
        .children-list h3 { margin: 0 0 8px; }
        .search {
            padding: 5px 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            width: 280px;
        }

        .blob {
            background: #fafafa;
            padding: 10px;
            border: 1px solid #ddd;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow: auto;
        }

        .edges-section ul, .links-section ul { margin-top: 4px; padding-left: 20px; }
        .edge-type {
            font-style: italic;
            color: #678;
            font-size: 12px;
            margin-right: 4px;
        }

        .error {
            padding: 20px;
            background: #fee;
            border-left: 5px solid #c33;
            margin: 30px;
        }
    </style>
</head>
<body>

<script>
(function () {
    const { html, render, useState, useMemo, useEffect } = window.preactStandalone;

    function indexNodes(root) {
        const byId = new Map();
        const parentOf = new Map();
        (function walk(node, parent) {
            if (!node || !node.id) return;
            byId.set(node.id, node);
            if (parent) parentOf.set(node.id, parent.id);
            (node.children || []).forEach(c => walk(c, node));
        })(root, null);
        return { byId, parentOf };
    }

    function indexEdges(edges) {
        const outgoing = new Map();
        const incoming = new Map();
        for (const e of (edges || [])) {
            if (!outgoing.has(e.from)) outgoing.set(e.from, []);
            outgoing.get(e.from).push(e);
            if (!incoming.has(e.to)) incoming.set(e.to, []);
            incoming.get(e.to).push(e);
        }
        return { outgoing, incoming };
    }

    function pathFromRoot(parentOf, targetId) {
        const path = [];
        let cur = targetId;
        // Bound the walk so a cyclic parent map can't lock the UI.
        for (let i = 0; cur && i < 1000; i++) {
            path.unshift(cur);
            cur = parentOf.get(cur);
        }
        return path;
    }

    // Use the node's explicit count if set; otherwise sum the explicit counts
    // of descendants. Returns null if no count info is available, so the renderer
    // can suppress the parenthetical entirely.
    function displayCount(node) {
        if (!node) return null;
        if (node.count != null) return node.count;
        let sum = 0, anySet = false;
        for (const c of (node.children || [])) {
            const cc = displayCount(c);
            if (cc != null) { sum += cc; anySet = true; }
        }
        return anySet ? sum : null;
    }

    // A node belongs in the tree if it has children, tables, or an explicit
    // count — i.e. it's a meaningful drill-down target. Body alone isn't enough
    // (a body is a leaf-detail kind of thing); a 20k-leaf action tree would
    // otherwise blow up the sidebar. Producers that want a body-only node
    // visible in the tree can set count=N to opt in.
    function isStructural(node) {
        return (node.children && node.children.length > 0)
            || (node.tables   && node.tables.length   > 0)
            || node.count != null;
    }

    function sortByCategory(children, categoryDefs) {
        if (!categoryDefs) return children;
        return children.slice().sort((a, b) => {
            const ao = (a.categoryRef && categoryDefs[a.categoryRef] && categoryDefs[a.categoryRef].order) || 999;
            const bo = (b.categoryRef && categoryDefs[b.categoryRef] && categoryDefs[b.categoryRef].order) || 999;
            return ao - bo;
        });
    }

    function formatField(value, fieldDef) {
        if (value === null || value === undefined || value === '') return '';
        const type = (fieldDef && fieldDef.type) || 'text';
        switch (type) {
            case 'link': {
                const tpl = (fieldDef && fieldDef.hrefTemplate) || '#';
                const href = tpl.replace('{value}', encodeURIComponent(String(value)));
                return html`<a href=${href} target="_blank" rel="noopener">${value}</a>`;
            }
            case 'date':
                return new Date(value).toLocaleString();
            case 'number':
                return Number(value).toLocaleString();
            case 'boolean':
                return value ? '✓' : '✗';
            case 'html':
                return html`<span dangerouslySetInnerHTML=${{ __html: String(value) }}></span>`;
            default:
                return String(value);
        }
    }

    function csvEscape(v) {
        const s = (v == null) ? '' : String(v);
        // Defuse CSV formula injection: values starting with =, +, -, @, tab or CR
        // get interpreted as formulas by Excel/Sheets. Prepend a single quote so
        // the spreadsheet renders them as literal text.
        const needsFormulaGuard = /^[=+\-@\t\r]/.test(s);
        const guarded = needsFormulaGuard ? "'" + s : s;
        return /[",\n]/.test(guarded) ? '"' + guarded.replace(/"/g, '""') + '"' : guarded;
    }

    function downloadCsv(columns, rows, filename) {
        const lines = [columns.map(c => csvEscape(c.title)).join(',')];
        for (const row of rows) {
            lines.push(columns.map(c => csvEscape(row[c.key])).join(','));
        }
        const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename || 'table.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    const downloadIcon = html`
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
    `;

    function Body({ body }) {
        if (!body || !body.content) return null;
        const format = body.format || 'text';
        if (format === 'html') {
            return html`<div className="body" data-format="html"
                            dangerouslySetInnerHTML=${{ __html: body.content }}></div>`;
        }
        return html`<div className="body" data-format="text">${body.content}</div>`;
    }

    function Tag({ name, def }) {
        const color = (def && def.color) || '#aeaeff';
        const label = (def && def.label) || name;
        const title = (def && def.description) || '';
        return html`<span className="tag" style=${{ backgroundColor: color }} title=${title}>${label}</span>`;
    }

    const TABLE_SEARCH_THRESHOLD = 10;

    function ReportTable({ table, definitions }) {
        const [search, setSearch] = useState('');

        let columns = table.columns;
        let description = table.description;
        const schemaRef = table.schemaRef;
        const schema = schemaRef && definitions && definitions.tableSchemas && definitions.tableSchemas[schemaRef];
        if (schema) {
            columns = columns || schema.columns;
            description = description || schema.description;
        }
        if (!columns || !table.rows || table.rows.length === 0) return null;

        const filename = ((table.title || description || 'table')
            .replace(/[^a-z0-9]+/gi, '_')
            .toLowerCase()) + '.csv';

        const heading = table.title || description || null;
        const showDescription = description && description !== heading;
        const fieldDefs = (definitions && definitions.fields) || {};

        const q = search.trim().toLowerCase();
        const filteredRows = q
            ? table.rows.filter(row => columns.some(col => {
                const v = row[col.key];
                return v != null && String(v).toLowerCase().includes(q);
            }))
            : table.rows;
        const showSearch = table.rows.length > TABLE_SEARCH_THRESHOLD;

        return html`
            <div className="report-table">
                <div className="report-table-header">
                    ${heading ? html`<h4>${heading}</h4>` : html`<span></span>`}
                    <button className="csv-download-btn" title="Download as CSV"
                            onClick=${() => downloadCsv(columns, table.rows, filename)}>${downloadIcon}</button>
                </div>
                ${showDescription && html`<p className="table-description">${description}</p>`}
                ${showSearch && html`
                    <div className="table-search-row">
                        <input type="text" className="search" placeholder="Filter rows..."
                               onInput=${(e) => setSearch(e.target.value)} />
                        ${q && html`<span className="filter-info">${filteredRows.length.toLocaleString()} of ${table.rows.length.toLocaleString()}</span>`}
                    </div>
                `}
                <table className="data-table">
                    <thead>
                        <tr>
                            ${columns.map(col => html`<th>${col.title}</th>`)}
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredRows.map((row, idx) => html`
                            <tr key=${idx}>
                                ${columns.map(col => html`
                                    <td>${formatField(row[col.key], col.fieldRef ? fieldDefs[col.fieldRef] : null)}</td>
                                `)}
                            </tr>
                        `)}
                    </tbody>
                </table>
            </div>
        `;
    }

    function FieldList({ fields, definitions }) {
        if (!fields) return null;
        const keys = Object.keys(fields);
        if (keys.length === 0) return null;
        const fieldDefs = (definitions && definitions.fields) || {};
        return html`
            <table className="fields-table">
                <tbody>
                    ${keys.map(key => {
                        const def = fieldDefs[key] || {};
                        return html`
                            <tr key=${key}>
                                <th>${def.label || key}</th>
                                <td>${formatField(fields[key], def)}</td>
                            </tr>
                        `;
                    })}
                </tbody>
            </table>
        `;
    }

    function TreeNode({ node, selectedId, onSelect, definitions, depth, pathSet }) {
        const onPath = pathSet.has(node.id);
        const [userOpen, setUserOpen] = useState(null);
        useEffect(() => { if (onPath) setUserOpen(true); }, [onPath]);

        const open = userOpen !== null ? userOpen : (depth === 0 || onPath);
        const isSelected = node.id === selectedId;
        const allChildren = sortByCategory(node.children || [],
            definitions && definitions.categories);
        const children = allChildren.filter(isStructural);
        const hasChildren = children.length > 0;
        const cat = node.categoryRef && definitions && definitions.categories
            && definitions.categories[node.categoryRef];
        const count = displayCount(node);

        return html`
            <div className="tree-node">
                <div className=${'tree-row' + (isSelected ? ' selected' : '')} style=${{ paddingLeft: (depth * 12) + 'px' }}>
                    ${hasChildren
                        ? html`<span className="tree-toggle"
                                onClick=${() => setUserOpen(!open)}>${open ? '▾' : '▸'}</span>`
                        : html`<span className="tree-toggle"> </span>`}
                    <a href="#" onClick=${(e) => { e.preventDefault(); onSelect(node.id); }}>
                        ${cat && cat.icon && html`<span className="cat-icon">${cat.icon}</span>`}
                        ${node.title || node.id}
                        ${count != null && html` <span className="count">(${count.toLocaleString()})</span>`}
                    </a>
                </div>
                ${open && hasChildren && html`
                    <div className="tree-children">
                        ${children.map(child => html`
                            <${TreeNode} key=${child.id} node=${child} selectedId=${selectedId} onSelect=${onSelect} definitions=${definitions} depth=${depth + 1} pathSet=${pathSet} />
                        `)}
                    </div>
                `}
            </div>
        `;
    }

    function ChildrenList({ node, definitions, onSelect }) {
        const [search, setSearch] = useState('');
        const children = sortByCategory(node.children || [],
            definitions && definitions.categories);
        if (children.length === 0) return null;

        // Only show field columns when every child is a leaf — otherwise we're
        // looking at a category-of-categories view (e.g. type → subType) where
        // some children may carry fields (single-action collapse) and others
        // don't (multi-action structural), giving a column union that's mostly
        // empty. At those intermediate levels, just show title + items count.
        const childrenAreLeaves = children.every(c => !c.children || c.children.length === 0);
        const fieldKeys = [];
        if (childrenAreLeaves) {
            const seenFields = new Set();
            for (const c of children) {
                if (!c.fields) continue;
                for (const k of Object.keys(c.fields)) {
                    if (!seenFields.has(k)) { seenFields.add(k); fieldKeys.push(k); }
                }
            }
        }
        const anyTags = childrenAreLeaves && children.some(c => (c.tags || []).length > 0);
        const anyChildCounts = children.some(c => displayCount(c) != null);

        const q = search.toLowerCase();
        const filtered = q ? children.filter(c => nodeText(c).toLowerCase().includes(q)) : children;

        const fieldDefs = (definitions && definitions.fields) || {};
        const tagDefs = (definitions && definitions.tags) || {};
        const catDefs = (definitions && definitions.categories) || {};

        return html`
            <div className="children-list">
                <h3>Items (${filtered.length.toLocaleString()})</h3>
                <input type="text" className="search" placeholder="Search..."
                       onInput=${(e) => setSearch(e.target.value)} />
                <table className="data-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            ${fieldKeys.map(k => {
                                const def = fieldDefs[k] || {};
                                return html`<th key=${k}>${def.label || k}</th>`;
                            })}
                            ${anyTags && html`<th>Tags</th>`}
                            ${anyChildCounts && html`<th>Items</th>`}
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map(child => {
                            const cat = child.categoryRef && catDefs[child.categoryRef];
                            const cnt = displayCount(child);
                            return html`
                                <tr key=${child.id}>
                                    <td>
                                        ${cat && cat.icon && html`<span className="cat-icon">${cat.icon}</span>`}
                                        <a href="#" onClick=${(e) => { e.preventDefault(); onSelect(child.id); }}>
                                            ${child.title || child.id}
                                        </a>
                                    </td>
                                    ${fieldKeys.map(k => {
                                        const def = fieldDefs[k] || {};
                                        const v = child.fields ? child.fields[k] : '';
                                        return html`<td key=${k}>${formatField(v, def)}</td>`;
                                    })}
                                    ${anyTags && html`<td>
                                        ${(child.tags || []).map(t => html`<${Tag} key=${t} name=${t} def=${tagDefs[t]} />`)}
                                    </td>`}
                                    ${anyChildCounts && html`<td>${cnt != null ? cnt.toLocaleString() : ''}</td>`}
                                </tr>
                            `;
                        })}
                    </tbody>
                </table>
            </div>
        `;
    }

    function nodeText(node) {
        const parts = [node.title || '', node.id || ''];
        if (node.fields) parts.push(...Object.values(node.fields).map(v => v == null ? '' : String(v)));
        if (node.tags) parts.push(...node.tags);
        return parts.join(' ');
    }

    function NodeView({ node, data, nodeIndex, edgesIndex, onSelect }) {
        if (!node) return html`<div className="error"><h3>Node not found</h3></div>`;
        const definitions = data.definitions || {};
        const blobs = data.blobs || {};

        const cat = node.categoryRef && definitions.categories && definitions.categories[node.categoryRef];

        const parentId = nodeIndex.parentOf.get(node.id);
        const parent = parentId ? nodeIndex.byId.get(parentId) : null;
        const siblings = parent ? sortByCategory(parent.children || [], definitions.categories) : [];
        const myIdx = siblings.findIndex(c => c.id === node.id);
        const prev = myIdx > 0 ? siblings[myIdx - 1] : null;
        const next = (myIdx >= 0 && myIdx < siblings.length - 1) ? siblings[myIdx + 1] : null;

        const outEdges = edgesIndex.outgoing.get(node.id) || [];
        const inEdges = edgesIndex.incoming.get(node.id) || [];

        // Arrow keys mirror the prev/next buttons so the user can hammer
        // through siblings without reaching for the mouse. We skip when an
        // input/textarea is focused so search boxes still work normally.
        useEffect(() => {
            function onKey(e) {
                if (e.altKey || e.ctrlKey || e.metaKey || e.shiftKey) return;
                const t = e.target;
                if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
                if (e.key === 'ArrowLeft' && prev) { e.preventDefault(); onSelect(prev.id); }
                else if (e.key === 'ArrowRight' && next) { e.preventDefault(); onSelect(next.id); }
            }
            window.addEventListener('keydown', onKey);
            return () => window.removeEventListener('keydown', onKey);
        }, [prev && prev.id, next && next.id]);

        return html`
            <div className="node-view">
                ${(prev || next) && html`
                    <div className="nav-buttons">
                        ${prev
                            ? html`<button onClick=${() => onSelect(prev.id)} title=${'Previous: ' + (prev.title || prev.id)} aria-label="Previous">←</button>`
                            : html`<span className="spacer"></span>`}
                        ${next
                            ? html`<button onClick=${() => onSelect(next.id)} title=${'Next: ' + (next.title || next.id)} aria-label="Next">→</button>`
                            : html`<span className="spacer"></span>`}
                    </div>
                `}
                <h2>
                    ${cat && cat.icon && html`<span className="cat-icon">${cat.icon}</span> `}
                    ${node.title || node.id}
                </h2>
                ${cat && cat.description && html`<div className="category-description">${cat.description}</div>`}
                ${node.tags && node.tags.length > 0 && html`
                    <div className="tags">
                        ${node.tags.map(t => html`<${Tag} key=${t} name=${t} def=${definitions.tags && definitions.tags[t]} />`)}
                    </div>
                `}
                <${Body} body=${node.body} />
                ${node.fields && Object.keys(node.fields).length > 0 && html`
                    <${FieldList} fields=${node.fields} definitions=${definitions} />
                `}
                ${(node.tables || []).map((t, i) => html`
                    <${ReportTable} key=${i} table=${t} definitions=${definitions} />
                `)}
                ${(node.blobRefs || []).filter(k => blobs[k] != null).map(k => html`
                    <pre key=${k} className="blob">${blobs[k]}</pre>
                `)}
                ${node.links && node.links.length > 0 && html`
                    <div className="links-section">
                        <h4>Links</h4>
                        <ul>
                            ${node.links.map((l, i) => html`<li key=${i}>
                                <a href=${l.href} target="_blank" rel="noopener">${l.title}</a>
                            </li>`)}
                        </ul>
                    </div>
                `}
                ${(outEdges.length > 0 || inEdges.length > 0) && html`
                    <div className="edges-section">
                        <h4>Related</h4>
                        <ul>
                            ${outEdges.map((e, i) => {
                                const t = nodeIndex.byId.get(e.to);
                                return html`<li key=${'o' + i}>
                                    <span className="edge-type">${e.type || 'related'}:</span>
                                    <a href="#" onClick=${(ev) => { ev.preventDefault(); onSelect(e.to); }}>
                                        ${t ? (t.title || t.id) : e.to}
                                    </a>
                                </li>`;
                            })}
                            ${inEdges.map((e, i) => {
                                const f = nodeIndex.byId.get(e.from);
                                return html`<li key=${'i' + i}>
                                    <span className="edge-type">← ${e.type || 'related'}:</span>
                                    <a href="#" onClick=${(ev) => { ev.preventDefault(); onSelect(e.from); }}>
                                        ${f ? (f.title || f.id) : e.from}
                                    </a>
                                </li>`;
                            })}
                        </ul>
                    </div>
                `}
                ${node.children && node.children.length > 0 && html`
                    <${ChildrenList} node=${node} definitions=${definitions} onSelect=${onSelect} />
                `}
            </div>
        `;
    }

    function Breadcrumbs({ path, nodeIndex, onSelect }) {
        if (!path || path.length === 0) return null;
        return html`
            <div id="breadcrumb">
                <ul>
                    ${path.map((id, i) => {
                        const n = nodeIndex.byId.get(id);
                        const label = n ? (n.title || n.id) : id;
                        const isLast = i === path.length - 1;
                        return html`<li key=${id}>
                            ${isLast
                                ? html`<span className="breadcrumb-current">${label}</span>`
                                : html`<a className="breadcrumb-button" href="#" onClick=${(e) => { e.preventDefault(); onSelect(id); }}>${label}</a>`}
                        </li>`;
                    })}
                </ul>
            </div>
        `;
    }

    function Header({ meta }) {
        return html`
            <div id="header">
                <h1>${meta.title}</h1>
                ${meta.subtitle && html`<div className="subtitle">${meta.subtitle}</div>`}
            </div>
        `;
    }

    function App({ data }) {
        if (!data || !data.root) {
            return html`<div className="error"><h2>Error</h2><p>No report data found.</p></div>`;
        }
        const nodeIndex = useMemo(() => indexNodes(data.root), [data]);
        const edgesIndex = useMemo(() => indexEdges(data.edges || []), [data]);
        const [selectedId, setSelectedId] = useState(data.root.id);

        const selectedNode = nodeIndex.byId.get(selectedId) || data.root;
        const path = pathFromRoot(nodeIndex.parentOf, selectedId);
        const pathSet = new Set(path);

        return html`
            <div id="report">
                <${Header} meta=${data.meta || {}} />
                <${Breadcrumbs} path=${path} nodeIndex=${nodeIndex} onSelect=${setSelectedId} />
                <div id="content">
                    <div id="left-nav">
                        <h3>Navigation</h3>
                        <${TreeNode} node=${data.root} selectedId=${selectedId} onSelect=${setSelectedId} definitions=${data.definitions} depth=${0} pathSet=${pathSet} />
                    </div>
                    <div id="right-content">
                        <${NodeView} node=${selectedNode} data=${data} nodeIndex=${nodeIndex} edgesIndex=${edgesIndex} onSelect=${setSelectedId} />
                    </div>
                </div>
                <div id="footer">
                    ${data.meta && data.meta.createdAt && html`Created ${new Date(data.meta.createdAt).toLocaleString()}`}
                    ${data.meta && data.meta.schemaVersion && html` · schema v${data.meta.schemaVersion}`}
                </div>
            </div>
        `;
    }

    async function loadReportData() {
        // Newer reports inline a gzipped + Base64-encoded payload
        // (REPORT_DATA_GZ); older reports inline the raw JSON object
        // (REPORT_DATA). Support both so previously generated reports keep
        // rendering.
        if (typeof window.REPORT_DATA_GZ === 'string') {
            if (typeof DecompressionStream !== 'function') {
                throw new Error('This report is compressed, but your browser does not support ' +
                    'DecompressionStream. Please open it in a current version of Chrome, Edge, Firefox, or Safari.');
            }
            const bytes = Uint8Array.from(atob(window.REPORT_DATA_GZ), c => c.charCodeAt(0));
            const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
            return JSON.parse(await new Response(stream).text());
        }
        return window.REPORT_DATA;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const root = document.getElementById('root');
        try {
            const data = await loadReportData();
            root.innerHTML = '';
            render(html`<${App} data=${data} />`, root);
        } catch (e) {
            root.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'error';
            const h = document.createElement('h2');
            h.textContent = 'Error Loading Report';
            const p = document.createElement('p');
            p.textContent = (e && e.message) ? e.message : String(e);
            div.appendChild(h);
            div.appendChild(p);
            root.appendChild(div);
        }
    });
})();
</script>

<div id="root">
    <div class="error">
        <h2>Error Loading Report</h2>
        <p>If you are viewing this report in Jenkins, you may have to download the file first by pressing ctrl+s or cmd+s</p>
    </div>
</div>

</body>
</html>

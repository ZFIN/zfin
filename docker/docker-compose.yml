services:
  base:
    build: ./base/
    image: ghcr.io/zfin/zfin-base:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    environment:
      TZ: ${TZ}
  compile:
    build:
      context: ./compile/
      args:
        ZFIN_RELEASE: ${ZFIN_RELEASE}
        DOCKER_ARCH: ${DOCKER_ARCH:-}
    image: ghcr.io/zfin/zfin-compile:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    profiles:
      - compile
    environment:
      PGHOST: db
      PGUSER: postgres
      SSH_AUTH_SOCK: /run/host-services/ssh-auth.sock
      SSH_USER: ${DOCKER_SSH_USER}
      SSH_HOST: ${DOCKER_SSH_HOST}
      TZ: ${TZ}
      ELK_VERSION: ${ELK_VERSION}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD}
      INSTANCE: ${DOCKER_INSTANCE}
      ZFIN_RELEASE: ${ZFIN_RELEASE}
      DOCKER_SSH_AUTH_SOCK: ${DOCKER_SSH_AUTH_SOCK}
      DOCKER_SSH_USER: ${DOCKER_SSH_USER}
      DOCKER_SSH_HOST: ${DOCKER_SSH_HOST}
      DOCKER_DB_UNLOADS_PATH: ${DOCKER_DB_UNLOADS_PATH}
      DOCKER_SOLR_UNLOADS_PATH: ${DOCKER_SOLR_UNLOADS_PATH}
      DOCKER_BLASTSERVER_BLAST_DATABASE_PATH: ${DOCKER_BLASTSERVER_BLAST_DATABASE_PATH}
      DOCKER_ABBLAST_PATH: ${DOCKER_ABBLAST_PATH}
      DOCKER_RESEARCH_PATH: ${DOCKER_RESEARCH_PATH}
      DOCKER_DOWNLOADS_PATH: ${DOCKER_DOWNLOADS_PATH}
      DOCKER_LOADUP_PATH: ${DOCKER_LOADUP_PATH}
      DOCKER_HHATLAS_PATH: ${DOCKER_HHATLAS_PATH}
      DOCKER_SOURCE_ROOTS_PATH: ${DOCKER_SOURCE_ROOTS_PATH}
      DOCKER_VIRTUAL_HOST: ${DOCKER_VIRTUAL_HOST}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME}
      DOCKER_INSTANCE: ${DOCKER_INSTANCE}
      OPENIDC_CLIENTID: ${OPENIDC_CLIENTID}
      OPENIDC_CLIENTSECRET: ${OPENIDC_CLIENTSECRET}
      OPENIDC_CRYPTOPASSPHRASE: ${OPENIDC_CRYPTOPASSPHRASE}
#      #UNCOMMENT BELOW FOR PERL DEBUGGING
#    ports:
#      - "127.0.0.1:12345-12354:12345"
    volumes:
      - www_data:/opt/zfin/www_homes/zfin.org
      - downloads_data:/opt/zfin/download-files
      - httpd_log:/opt/zfin/log/httpd
      - tls_certs:/opt/zfin/tls
      - keystore:/opt/apache/apache-tomcat/conf
      - certbot_data:/etc/letsencrypt
      - catalina_base:/opt/zfin/catalina_bases/zfin.org
      - jenkins_data:/opt/zfin/www_homes/zfin.org/server_apps/jenkins/jenkins-home
      - ${DOCKER_SOURCE_ROOTS_PATH}:/opt/zfin/source_roots/zfin.org:rw
      #- nfs-zunloads:/research/zunloads
      - ${DOCKER_DB_UNLOADS_PATH}:/opt/zfin/unloads/db
      - ${DOCKER_SOLR_UNLOADS_PATH}:/opt/zfin/unloads/solr
      - ${DOCKER_BLASTSERVER_BLAST_DATABASE_PATH}:/opt/zfin/blastdb
      - ${DOCKER_ABBLAST_PATH}:/opt/ab-blast
      - ${DOCKER_BOWTIE_PATH}/bowtie:/opt/misc/bowtie
      - ${DOCKER_BOWTIE_PATH}/bowtie2:/opt/misc/bowtie2
      - ${DOCKER_RESEARCH_PATH}:/mnt/research
      - ${DOCKER_LOADUP_PATH}:/opt/zfin/loadUp
      - ${DOCKER_DOWNLOADS_PATH}:/opt/zfin/download-files
      - ${DOCKER_GFF3_PATH}:/opt/zfin/gff3
      - ${DOCKER_SSH_AUTH_SOCK}:/run/host-services/ssh-auth.sock
      - ~/.ssh/known_hosts:/home/gradle/.ssh/known_hosts
      - /var/run/docker.sock:/var/run/docker.sock
      - maven_cache:/home/gradle/.m2
      - gradle_cache:/home/gradle/.gradle
  db:
    build: ./postgresql/
    image: ghcr.io/zfin/zfin-db:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    # Memory settings sized down from a prior 16g shared_buffers / 8g work_mem
    # configuration that contributed to repeated container OOMs during heavy
    # DIH workloads on a 32g host. Dial back up if you have a clearly RAM-rich
    # host and a workload that benefits.
    command: -c 'max_connections=7500' -c 'shared_buffers=4GB' -c 'huge_pages=try' -c 'temp_buffers=256MB' -c 'work_mem=256MB' -c 'maintenance_work_mem=1GB' -c 'max_wal_size=10GB' -c 'timezone=America/Los_Angeles' -c 'shared_preload_libraries="pg_stat_statements"'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_pass
      POSTGRES_INITDB_ARGS: "-E SQL_ASCII"
      POSTGRES_DB: zfindb
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: ${TZ}
    shm_size: 1g
    ports:
      - "${DOCKER_DB_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/
      - ${DOCKER_SOURCE_ROOTS_PATH}/docker/pg_pass:/run/secrets/pg_pass:ro
      - www_data:/opt/zfin/www_homes/zfin.org
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
  solr:
    build: ./solr/
    image: ghcr.io/zfin/zfin-solr:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    # Cap memory at heap + ~4g headroom (direct buffers, metaspace, jit code
    # cache, stack, native libs). Without this the kernel chooses which
    # container to OOM when the host gets tight, and Solr is always the
    # biggest target.
    mem_limit: 16g
    ulimits:
      nofile: 65536
    # Add fishadmin (gid 1076) so the non-root solr user can write backup snapshots to the group-owned unloads dir (which must also be g+w).
    group_add:
      - "1076"   # fishadmin
    environment:
      SOLR_MODULES: "scripting"
      SOLR_HEAP: 12g
      # solr.max.booleanClauses: Solr 9.x reads this at JVM startup and uses
      # it as the ceiling for IndexSearcher.MAX_CLAUSE_COUNT. The per-core
      # <maxBooleanClauses> in solrconfig.xml can't exceed this JVM-level
      # value, so bumping it there alone doesn't help. Edismax query
      # expansion can produce more clauses on Solr 9 than Solr 8 did for
      # the same user input — 4096 covers the long queries from our prod
      # access log that overflowed 1024 during cutover characterization.
      SOLR_OPTS: "-Dsolr.allowPaths=/opt/zfin/unloads/solr -Dsolr.max.booleanClauses=4096"
      SOLR_SECURITY_MANAGER_ENABLED: "false"
      TZ: ${TZ}
    ports:
      - "8983-8992:8983"
    volumes:
      # Single volume covering everything Solr persists. The image's
      # /docker-entrypoint-initdb.d/sync-config.sh refreshes conf/, lib/, and
      # log4j2.xml from image-baked templates on every container start, so
      # this volume only legitimately holds index data, tlog, snapshots,
      # external_popularity.txt, and runtime logs. Renamed from `solr_data`
      # so VMs upgrading from Solr 8 get a clean volume instead of
      # inheriting stale 8-era config + jars.
      - solr_var:/var/solr
      - ${DOCKER_SOLR_UNLOADS_PATH}:/opt/zfin/unloads/solr
  httpd:
    hostname: zfin.org
    build: ./httpd/
    image: ghcr.io/zfin/zfin-httpd:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    environment:
      LETSENCRYPT_HOST: ${DOCKER_VIRTUAL_HOST}
      VIRTUAL_HOST: ${DOCKER_VIRTUAL_HOST}
      VIRTUAL_PROTO: https
      VIRTUAL_PORT: 443
      OPENIDC_CRYPTOPASSPHRASE: ${OPENIDC_CRYPTOPASSPHRASE}
      OPENIDC_CLIENTID: ${OPENIDC_CLIENTID}
      OPENIDC_CLIENTSECRET: ${OPENIDC_CLIENTSECRET}
      DISABLE_OIDC: ${DISABLE_OIDC:-false}
      TZ: ${TZ}
    ports:
      - "${DOCKER_HTTPD_HTTP_PORT:-8080-8089}:80"
      - "${DOCKER_HTTPD_HTTPS_PORT:-8443-8452}:443"
    volumes:
      - www_data:/opt/zfin/www_homes/zfin.org
      - httpd_log:/var/log/httpd
      - tls_certs:/opt/zfin/tls
      #- nfs-loadup:/opt/zfin/loadUp
      - ${DOCKER_LOADUP_PATH}:/opt/zfin/loadUp
      - ${DOCKER_DOWNLOADS_PATH}:/opt/zfin/download-files
      - ${DOCKER_HHATLAS_PATH}:/opt/zfin/hh_atlas
      #- /etc/pki/tls/certs/incommon_intermediate_bundle.crt:/etc/pki/tls/certs/incommon_intermediate_bundle.crt,ro
      #- /etc/pki/tls/certs/zfin_2021.crt:/etc/pki/tls/certs/zfin_2021.crt,ro
      #- /etc/pki/tls/private/zfin_2021.key:/etc/pki/tls/private/zfin_2021.key,ro
      - certbot_data:/etc/letsencrypt
  certbot:
    build: ./certbot/
    volumes:
      - certbot_data:/etc/letsencrypt
      - www_data:/opt/zfin/www_homes/zfin.org
  tomcat:
    build: ./tomcat/
    image: ghcr.io/zfin/zfin-tomcat:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    environment:
      CATALINA_BASE: /opt/zfin/catalina_bases/zfin.org
      INSTANCE: docker
      JVM_OPTS: -Xms2048m -Xmx8192m -Xss2m
      UMASK: "002"
      TZ: ${TZ}
    volumes:
      - www_data:/opt/zfin/www_homes/zfin.org
      - catalina_base:/opt/zfin/catalina_bases/zfin.org
      - keystore:/opt/apache/apache-tomcat/conf
      - ${DOCKER_BLASTSERVER_BLAST_DATABASE_PATH}:/opt/zfin/blastdb
      - ${DOCKER_ABBLAST_PATH}:/opt/ab-blast
      - ${DOCKER_BOWTIE_PATH}/bowtie:/opt/misc/bowtie
      - ${DOCKER_BOWTIE_PATH}/bowtie2:/opt/misc/bowtie2
      - ${DOCKER_DOWNLOADS_PATH}:/opt/zfin/download-files
      - ${DOCKER_LOADUP_PATH}:/opt/zfin/loadUp
      - ${DOCKER_GFF3_PATH}:/opt/zfin/gff3
  tomcatdebug:
    hostname: tomcat
    build: ./tomcat/
    profiles:
      - debug
    environment:
      CATALINA_BASE: /opt/zfin/catalina_bases/zfin.org
      INSTANCE: docker
      JVM_OPTS: -Xms2048m -Xmx8192m -Xss2m
      UMASK: "002"
      TZ: ${TZ}
      JPDA_ADDRESS: "*:5000"
      JPDA_TRANSPORT: dt_socket
    entrypoint: ["catalina.sh", "jpda", "run"]
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - www_data:/opt/zfin/www_homes/zfin.org
      - catalina_base:/opt/zfin/catalina_bases/zfin.org
      - keystore:/opt/apache/apache-tomcat/conf
      - ${DOCKER_BLASTSERVER_BLAST_DATABASE_PATH}:/opt/zfin/blastdb
      - ${DOCKER_ABBLAST_PATH}:/opt/ab-blast
      - ${DOCKER_BOWTIE_PATH}/bowtie:/opt/misc/bowtie
      - ${DOCKER_BOWTIE_PATH}/bowtie2:/opt/misc/bowtie2
      - ${DOCKER_DOWNLOADS_PATH}:/opt/zfin/download-files
      - ${DOCKER_LOADUP_PATH}:/opt/zfin/loadUp
      - ${DOCKER_GFF3_PATH}:/opt/zfin/gff3
  blast:
    build: ./blast/
    platform: linux/amd64
    environment:
      TZ: ${TZ}
    volumes:
      - ${DOCKER_ABBLAST_PATH}:/opt/ab-blast
      - ${DOCKER_BOWTIE_PATH}/bowtie:/opt/misc/bowtie
      - ${DOCKER_BOWTIE_PATH}/bowtie2:/opt/misc/bowtie2
      - ${DOCKER_BLASTSERVER_BLAST_DATABASE_PATH}:/opt/zfin/blastdb
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    environment:
      MP_SMTP_BIND_ADDR: "0.0.0.0:25"
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_WEBROOT: /mailpit
    volumes:
      - mailpit_data:/data
  jenkins:
    build: 
      context: ./jenkins/
      args:
        ZFIN_RELEASE: ${ZFIN_RELEASE}
        DOCKER_ARCH: ${DOCKER_ARCH:-}
    image: ghcr.io/zfin/zfin-jenkins:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    ports:
      - "${DOCKER_JENKINS_HTTP_PORT:-9499-9509}:9499"
    environment:
      PGHOST: db
      PGUSER: postgres
      TZ: ${TZ}
      INSTANCE: ${DOCKER_INSTANCE}
      OPENIDC_CLIENTID: ${OPENIDC_CLIENTID}
      OPENIDC_CLIENTSECRET: ${OPENIDC_CLIENTSECRET}
    volumes:
      #- jenkins_data:/var/jenkins_home
      - ${DOCKER_SOURCE_ROOTS_PATH}:/opt/zfin/source_roots/zfin.org
      - www_data:/opt/zfin/www_homes/zfin.org
      - catalina_base:/opt/zfin/catalina_bases/zfin.org
      - downloads_data:/opt/zfin/download-files
      - jenkins_data:/opt/zfin/www_homes/zfin.org/server_apps/jenkins/jenkins-home
      - ${DOCKER_RESEARCH_PATH}:/mnt/research
      - ${DOCKER_ABBLAST_PATH}:/opt/ab-blast
      - ${DOCKER_BOWTIE_PATH}/bowtie:/opt/misc/bowtie
      - ${DOCKER_BOWTIE_PATH}/bowtie2:/opt/misc/bowtie2
      - ${DOCKER_BLASTSERVER_BLAST_DATABASE_PATH}:/opt/zfin/blastdb
      - ${DOCKER_DB_UNLOADS_PATH}:/opt/zfin/unloads/db
      - ${DOCKER_SOLR_UNLOADS_PATH}:/opt/zfin/unloads/solr
      - ${DOCKER_DOWNLOADS_PATH}:/opt/zfin/download-files
      - ${DOCKER_LOADUP_PATH}:/opt/zfin/loadUp
      - ${DOCKER_GFF3_PATH}:/opt/zfin/gff3
      - maven_cache:/home/gradle/.m2
      - gradle_cache:/home/gradle/.gradle
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
  ncbiload:
    build: ./ncbiload/
    environment:
      PGHOST: localhost
      PGUSER: postgres
      TZ: ${TZ}
      INSTANCE: ${DOCKER_INSTANCE}
      IS_NCBI_LOAD_CONTAINER: "true"
    volumes:
      - ${DOCKER_SOURCE_ROOTS_PATH}:/opt/zfin/source_roots/zfin.org
      - ${DOCKER_RESEARCH_PATH}:/mnt/research
      - maven_cache:/home/gradle/.m2
      - gradle_cache:/home/gradle/.gradle
  fail2ban:
    build: ./fail2ban/
    image: ghcr.io/zfin/zfin-fail2ban:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ}
      VERBOSITY: -vv #optional
    volumes:
      - fail2ban_config:/config
      - httpd_log:/var/log/httpd:ro #optional
      - /etc/localtime:/etc/localtime:ro
  elasticsearch:
    build:
      context: ./elasticsearch/
      args:
        ELK_VERSION: ${ELK_VERSION}
    image: ghcr.io/zfin/zfin-elasticsearch:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    profiles:
      - logging
    environment:
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:9200-9209:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
  filebeat:
    build:
      context: ./filebeat/
      args:
        ELK_VERSION: ${ELK_VERSION}
    image: ghcr.io/zfin/zfin-filebeat:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    profiles:
      - logging
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      TZ: ${TZ}
    volumes:
      - httpd_log:/var/log/httpd
      - catalina_base:/opt/zfin/catalina_bases/zfin.org
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro      
  metricbeat:
    image: ghcr.io/zfin/zfin-metricbeat:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    build:
      context: ./metricbeat/
      args:
        ELK_VERSION: ${ELK_VERSION}
    profiles:
      - logging
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    volumes:
      - /proc:/hostfs/proc:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro      
    depends_on:
      - elasticsearch
  kibana:
    build:
      context: ./kibana/
      args:
        ELK_VERSION: ${ELK_VERSION}
    image: ghcr.io/zfin/zfin-kibana:${ZFIN_RELEASE}${DOCKER_ARCH:-}
    profiles:
      - logging
    environment:
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD}
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: ${XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:5601-5610:5601"
    volumes:
      - kibana_data:/usr/share/kibana/data
  jbrowse:
    profiles:
      - jbrowse
    build:
      context: ./jbrowse/
      dockerfile: ./Dockerfile
    ports:
      - "127.0.0.1:8898-8907:80"
    volumes:
      - jbrowse_data:/data
  processgff:
    profiles:
      - jbrowse
    build:
      context: ./jbrowse/
      dockerfile: ./Dockerfile.processgff
    volumes:
      - jbrowse_data:/data

volumes:
  gradle_cache:
  maven_cache:
  www_data:
  httpd_log:
  tls_certs:
  keystore:
  catalina_base:
  pg_data:
  solr_var:
  downloads_data:
  jenkins_data:
  fail2ban_config:
  elasticsearch_data:
  kibana_data:
  certbot_data:
  jbrowse_data:
  mailpit_data:
  nfs-zunloads:
    driver_opts:
      type: nfs
      o: addr=10.128.116.85,ro
      device: :/vol/unloads/
  nfs-loadup:
    driver_opts:
      type: nfs
      o: addr=10.128.116.85,ro
      device: :/vol/central/loadUp

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZIRC API — Swagger UI</title>
  <!--
    Swagger UI v5.17.14 vendored under home/WEB-INF/openapi/swagger-ui/
    and served by ZircOpenApiController. Bumping the version is a manual
    refresh of the two files in that directory.
    -->
  <link rel="stylesheet" href="/action/api/zirc/docs/swagger-ui.css">
  <style>
    html, body { margin: 0; padding: 0; }
    .topbar { display: none; }
  </style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="/action/api/zirc/docs/swagger-ui-bundle.js"></script>
<script>
  window.addEventListener('load', () => {
    window.ui = SwaggerUIBundle({
      url: '/action/api/zirc/openapi.yaml',
      dom_id: '#swagger-ui',
      deepLinking: true,
      docExpansion: 'list',
      tagsSorter: 'alpha',
      operationsSorter: 'method',
    });
  });
</script>
</body>
</html>

String webDir = "${project.rootDir}/home/WEB-INF"
String validateData = "${project.rootDir}/server_apps/DB_maintenance"
def env = System.getenv()
def dbname = env['DBNAME']

if (project.hasProperty("jobName")) {
    ext.cmdargs = project.getProperty("jobName")
} else {
    ext.cmdargs = ""
}

// Every JavaExec task here uses sourceSets.main.runtimeClasspath, which includes
// home/WEB-INF/classes (the dir the root-project copyClasspathTemplates task
// writes into). Gradle 8.x strict validation fails any such task without an
// explicit dependency edge. The root build.gradle wires this for its own
// JavaExec tasks, but tasks.withType only sees the project it runs in, so the
// subproject tasks need their own edge to the root task.
// TODO: this can be replaced once we use the conventional path for src/main/resources/...
tasks.withType(JavaExec).configureEach {
    dependsOn rootProject.tasks.named('copyClasspathTemplates')
}

